<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cosmo">
<meta name="theme-color" content="#05060d">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<title>Commander Cosmo — Galactic Pogo Patrol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #05060d;
    font-family: "Press Start 2P", "Courier New", monospace;
    -webkit-user-select: none; user-select: none;
    touch-action: none; overscroll-behavior: none;
  }
  #game {
    display: block; position: absolute; top: 0; left: 0;
    image-rendering: pixelated; image-rendering: crisp-edges;
    background: #05060d; touch-action: none;
  }
  #loading {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: #3fae57;
    font-size: 14px; gap: 14px; z-index: 10; text-align: center;
  }
  #loading .sub { color: #7be39a; font-size: 9px; }
  /* on-screen touch controls (mobile) */
  #touch {
    position: absolute; inset: 0; display: none; z-index: 5;
    pointer-events: none; justify-content: space-between; align-items: flex-end;
    padding: 0 calc(14px + env(safe-area-inset-right)) calc(22px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));
  }
  #touch .dpad { display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: auto; }
  #touch .dpad-mid { display: flex; gap: 30px; }
  #touch .acts { display: flex; gap: 12px; pointer-events: auto; align-items: flex-end; }
  #touch button {
    width: 54px; height: 54px; border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.4);
    background: rgba(20,30,50,0.5); color: #fff;
    font-family: inherit; font-size: 9px;
    -webkit-tap-highlight-color: transparent; touch-action: none;
  }
  #touch .acts button { border-radius: 50%; }
  #touch button:active, #touch button.on { background: rgba(60,180,110,0.8); }
</style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="loading">
    COMMANDER COSMO
    <div class="sub">loading… (click or press a key for sound)</div>
  </div>
  <div id="touch">
    <div class="dpad">
      <button id="btn-up">▲</button>
      <div class="dpad-mid">
        <button id="btn-left">◀</button>
        <button id="btn-right">▶</button>
      </div>
      <button id="btn-down">▼</button>
    </div>
    <div class="acts">
      <button id="btn-pogo">POGO</button>
      <button id="btn-shoot">FIRE</button>
      <button id="btn-jump">JUMP</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
